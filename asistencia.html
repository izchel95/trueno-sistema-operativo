<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>⚡ Trueno — Asistencia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0e0e0e; color: #f0ede8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; padding: 24px 20px 60px;
    }

    .header { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
    .logo { font-size: 20px; font-weight: 800; }
    .logo span { color: #f5c842; }
    .back-btn {
      background: transparent; border: 1px solid #2a2a2a; border-radius: 10px;
      color: #666; padding: 7px 13px; font-size: 13px; cursor: pointer;
      text-decoration: none; display: inline-block;
    }

    .banner {
      border-radius: 14px; padding: 13px 16px; font-size: 13px;
      line-height: 1.5; margin-bottom: 24px;
    }
    .banner.ok  { background: #0a2a0a; border: 1px solid #1a5a1a; color: #6fcf6f; }
    .banner.warn { background: #1a1000; border: 1px solid #4a3000; color: #f5a842; }

    .section-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
      color: #555; margin-bottom: 12px;
    }

    .persona-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
    .persona-btn {
      background: #141414; border: 2px solid #222; border-radius: 14px;
      color: #f0ede8; padding: 20px 10px; text-align: center;
      cursor: pointer; font-size: 15px; font-weight: 600;
      transition: border-color .15s, background .15s;
    }
    .persona-btn.active { border-color: #f5c842; background: #1a1700; color: #f5c842; }

    .pin-wrap { margin-bottom: 28px; }
    .pin-input {
      width: 100%; background: #141414; border: 1px solid #252525;
      border-radius: 14px; color: #f0ede8; font-size: 28px; font-weight: 700;
      padding: 18px; outline: none; text-align: center; letter-spacing: 10px;
      font-family: monospace; transition: border-color .15s;
    }
    .pin-input:focus { border-color: #f5c842; }

    .event-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
    .event-btn {
      padding: 20px 10px; border-radius: 14px; border: 2px solid #222;
      background: #141414; color: #555; font-size: 15px; font-weight: 600;
      cursor: pointer; text-align: center; transition: all .15s;
    }
    .event-btn.sel-in  { border-color: #2d8f2d; background: #091a09; color: #6fcf6f; }
    .event-btn.sel-out { border-color: #8f2d2d; background: #1a0909; color: #cf6f6f; }

    .submit-btn {
      width: 100%; padding: 19px; border-radius: 16px; border: none;
      background: #f5c842; color: #0e0e0e; font-size: 17px; font-weight: 800;
      cursor: pointer; transition: opacity .15s;
    }
    .submit-btn:disabled { background: #222; color: #444; cursor: not-allowed; }

    .result {
      display: none; border-radius: 16px; padding: 22px; text-align: center;
      font-size: 16px; font-weight: 600; margin-top: 20px; line-height: 1.6;
    }
    .result.ok  { background: #091a09; border: 1px solid #2d8f2d; color: #6fcf6f; }
    .result.err { background: #1a0909; border: 1px solid #8f2d2d; color: #cf6f6f; }
    .result small { display: block; font-size: 13px; color: #888; font-weight: 400; margin-top: 6px; }

    .new-btn {
      display: none; width: 100%; margin-top: 14px; padding: 16px;
      background: transparent; border: 1px solid #333; border-radius: 14px;
      color: #888; font-size: 15px; cursor: pointer;
    }
  </style>
</head>
<body>

<div class="header">
  <a class="back-btn" href="index.html">←</a>
  <div class="logo">⚡ <span>Trueno</span></div>
</div>

<div id="qr-banner"></div>

<div class="section-label">¿Quién eres?</div>
<div class="persona-grid">
  <button class="persona-btn" onclick="selPersona('Melanie',this)">Melanie</button>
  <button class="persona-btn" onclick="selPersona('Daniela',this)">Daniela</button>
  <button class="persona-btn" onclick="selPersona('Daniel',this)">Daniel</button>
  <button class="persona-btn" onclick="selPersona('Izchel',this)">Izchel</button>
</div>

<div class="pin-wrap">
  <div class="section-label">Tu PIN</div>
  <input class="pin-input" id="pin" type="password" inputmode="numeric"
         maxlength="6" placeholder="••••" autocomplete="off" oninput="check()">
</div>

<div class="section-label">Tipo de registro</div>
<div class="event-grid">
  <button class="event-btn" id="btn-in"  onclick="selEvent('check_in',this)">🟢 Entrada</button>
  <button class="event-btn" id="btn-out" onclick="selEvent('check_out',this)">🔴 Salida</button>
</div>

<button class="submit-btn" id="submit" disabled onclick="registrar()">Registrar</button>

<div class="result" id="result"></div>
<button class="new-btn" id="new-btn" onclick="reset()">+ Registrar otro</button>

<script>
  const SB_URL = 'https://axxbsjbywivolwluzvrd.supabase.co'

  var persona = null
  var eventType = null
  var qrToken = null

  // Leer token del QR escaneado
  qrToken = new URLSearchParams(window.location.search).get('token')

  var banner = document.getElementById('qr-banner')
  if (qrToken) {
    banner.innerHTML = '<div class="banner ok">✅ QR escaneado — completa los datos para registrar</div>'
  } else {
    banner.innerHTML = '<div class="banner warn">⚠️ Sin QR — debes escanear el código del mostrador con tu cámara para poder registrar</div>'
  }

  function selPersona(nombre, btn) {
    persona = nombre
    document.querySelectorAll('.persona-btn').forEach(function(b) { b.classList.remove('active') })
    btn.classList.add('active')
    check()
  }

  function selEvent(type, btn) {
    eventType = type
    document.getElementById('btn-in').className = 'event-btn'
    document.getElementById('btn-out').className = 'event-btn'
    btn.className = 'event-btn ' + (type === 'check_in' ? 'sel-in' : 'sel-out')
    check()
  }

  function check() {
    var pin = document.getElementById('pin').value
    document.getElementById('submit').disabled = !(persona && pin.length >= 4 && eventType && qrToken)
  }

  async function registrar() {
    var pin = document.getElementById('pin').value
    var btn = document.getElementById('submit')
    btn.disabled = true
    btn.textContent = 'Registrando...'

    // GPS: best-effort, no bloquea si el usuario lo deniega
    var device_lat = null, device_lng = null
    try {
      var pos = await new Promise(function(res, rej) {
        navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000, maximumAge: 30000 })
      })
      device_lat = pos.coords.latitude
      device_lng = pos.coords.longitude
    } catch(e) {}

    try {
      var r = await fetch(SB_URL + '/functions/v1/checkin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          employee_name: persona,
          pin: pin,
          qr_token: qrToken,
          device_lat: device_lat,
          device_lng: device_lng,
          event_type: eventType
        })
      })
      var data = await r.json()
      var res = document.getElementById('result')
      res.style.display = 'block'

      if (data.success) {
        res.className = 'result ok'
        var hora = new Date(data.server_time).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' })
        res.innerHTML = data.message +
          (data.flagged ? '<br><span style="color:#f5a842;font-size:13px">⚠️ Ubicación inusual anotada</span>' : '') +
          '<small>Hora del servidor: ' + hora + '</small>'
        btn.style.display = 'none'
        document.getElementById('new-btn').style.display = 'block'
      } else {
        res.className = 'result err'
        res.textContent = '❌ ' + (data.error || 'Error desconocido')
        btn.disabled = false
        btn.textContent = 'Registrar'
      }
    } catch(e) {
      var res = document.getElementById('result')
      res.style.display = 'block'
      res.className = 'result err'
      res.textContent = '❌ Sin conexión al servidor'
      btn.disabled = false
      btn.textContent = 'Registrar'
    }
  }

  function reset() {
    persona = null; eventType = null
    document.getElementById('pin').value = ''
    document.querySelectorAll('.persona-btn').forEach(function(b) { b.classList.remove('active') })
    document.getElementById('btn-in').className = 'event-btn'
    document.getElementById('btn-out').className = 'event-btn'
    document.getElementById('result').style.display = 'none'
    document.getElementById('submit').style.display = 'block'
    document.getElementById('new-btn').style.display = 'none'
    check()
  }
</script>
</body>
</html>
