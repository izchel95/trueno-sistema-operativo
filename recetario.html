<title>Recetario — Trueno ⚡</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0e0e;
    color: #f0ede8;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: #0e0e0e;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid #1e1e1e;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: #f5c842; }

  .back-link, .menu-btn {
    display: inline-flex;
    align-items: center;
    padding: 8px 14px;
    background: #1a1600;
    border: 1px solid #f5c842;
    border-radius: 10px;
    color: #f5c842;
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .search-wrap {
    display: flex;
    align-items: center;
    background: #141414;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 0 14px;
    margin-bottom: 10px;
  }

  .search-wrap:focus-within { border-color: #f5c842; }

  .search-icon { color: #444; font-size: 16px; margin-right: 8px; }

  input[type="search"] {
    flex: 1;
    background: transparent;
    border: none;
    color: #f0ede8;
    font-size: 15px;
    padding: 12px 0;
    outline: none;
    font-family: inherit;
  }

  input[type="search"]::placeholder { color: #444; }

  .cats {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }

  .cats::-webkit-scrollbar { display: none; }

  .cat-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    background: #141414;
    color: #666;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .cat-btn.active {
    background: #f5c842;
    color: #0e0e0e;
    border-color: #f5c842;
    font-weight: 600;
  }

  .list { padding: 12px 16px; }

  .recipe-card {
    background: #141414;
    border: 1px solid #1e1e1e;
    border-radius: 16px;
    margin-bottom: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .recipe-card.open { border-color: #f5c842; }

  .recipe-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
  }

  .recipe-emoji { font-size: 28px; flex-shrink: 0; }

  .recipe-info { flex: 1; }

  .recipe-name {
    font-size: 15px;
    font-weight: 700;
    color: #f0ede8;
  }

  .recipe-meta {
    font-size: 12px;
    color: #555;
    margin-top: 2px;
  }

  .recipe-arrow {
    font-size: 18px;
    color: #333;
    transition: transform 0.2s;
  }

  .recipe-card.open .recipe-arrow { transform: rotate(90deg); color: #f5c842; }

  .recipe-body {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid #1e1e1e;
  }

  .recipe-card.open .recipe-body { display: block; }

  .recipe-section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #444;
    margin: 12px 0 8px;
  }

  .ingredient {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid #1e1e1e;
    font-size: 14px;
  }

  .ingredient:last-child { border-bottom: none; }

  .ingredient .name { color: #ccc; }
  .ingredient .amount { color: #f5c842; font-weight: 600; font-size: 13px; }

  .steps { margin-top: 4px; }

  .step {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    font-size: 13px;
    color: #999;
    line-height: 1.5;
    border-bottom: 1px solid #1a1a1a;
  }

  .step:last-child { border-bottom: none; }

  .step-num {
    width: 20px;
    height: 20px;
    background: #1e1e1e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #555;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .tip {
    background: #1a1600;
    border: 1px solid #3a2e00;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: #a88a00;
    margin-top: 12px;
    line-height: 1.5;
  }

  .no-results {
    text-align: center;
    color: #444;
    padding: 60px 20px;
    font-size: 15px;
  }
</style>
</head>

    nombre: 'Frappe Nutella', emoji: '🧋', cat: 'Frappes', meta: 'Con espresso · Licuado',
    ingredientes: [
      { name: 'Espresso', amount: '32-60 gr' },
      { name: 'Nutella', amount: '30 gr' },
      { name: 'Hielo', amount: '200 gr' },
      { name: 'Leche', amount: '150 gr' },
    ],
    pasos: ['Licuar todos los ingredientes hasta consistencia cremosa.', 'Servir en vaso frío.'],
  },
  // ══════════════════════ TISANAS ══════════════════════
  {
    nombre: 'Tisana', emoji: '🌿', cat: 'Tisanas', meta: 'Sin cafeína · Caliente / Frío',
    variantes: [
      { modo: '☀️ Caliente', ingredientes: [
        { name: 'Tisana', amount: '12 gr' },
        { name: 'Agua caliente', amount: '250 gr' },
      ]},
      { modo: '🧊 Frío', ingredientes: [
        { name: 'Tisana', amount: '12 gr' },
        { name: 'Agua caliente (para macerar)', amount: '30 gr' },
        { name: 'Hielo', amount: '200 gr' },
        { name: 'Agua', amount: '150 gr' },
      ]},
    ],
    pasos: ['Caliente: infusionar tisana en agua caliente.', 'Frío: macerar tisana en 30 gr de agua caliente por 2 minutos, luego agregar hielo y agua.'],
  },
];

const CATS = ['Todos', ...new Set(RECETAS.map(r => r.cat))];
let catActual = 'Todos';
let busqueda = '';

function renderCats() {
  const el = document.getElementById('cats');
  el.innerHTML = CATS.map(c =>
    `<button class="cat-btn${c === catActual ? ' active' : ''}" onclick="setcat('${c}')">${c}</button>`
  ).join('');
}

function setcat(c) {
  catActual = c;
  renderCats();
  renderLista();
}

function filtrar() {
  busqueda = document.getElementById('busqueda').value.toLowerCase();
  renderLista();
}

function renderLista() {
  const filtradas = RECETAS.filter(r => {
    const matchCat = catActual === 'Todos' || r.cat === catActual;
    const matchSearch = r.nombre.toLowerCase().includes(busqueda) || r.cat.toLowerCase().includes(busqueda);
    return matchCat && matchSearch;
  });

  const el = document.getElementById('lista');
  if (filtradas.length === 0) {
    el.innerHTML = '<div class="no-results">Sin resultados 🔍</div>';
    return;
  }

  el.innerHTML = filtradas.map((r, i) => `
    <div class="recipe-card" id="card-${i}" onclick="toggleCard(${i})">
      <div class="recipe-header">
        <div class="recipe-emoji">${r.emoji}</div>
        <div class="recipe-info">
          <div class="recipe-name">${r.nombre}</div>
          <div class="recipe-meta">${r.cat} · ${r.meta}</div>
        </div>
        <div class="recipe-arrow">›</div>
      </div>
      <div class="recipe-body">
        ${r.variantes ? r.variantes.map(v => `
          <div class="recipe-section-title">${v.modo}</div>
          ${v.ingredientes.map(ing => `
            <div class="ingredient">
              <span class="name">${ing.name}</span>
              <span class="amount">${ing.amount}</span>
            </div>
          `).join('')}
        `).join('') : `
          <div class="recipe-section-title">Ingredientes</div>
          ${(r.ingredientes||[]).map(ing => `
            <div class="ingredient">
              <span class="name">${ing.name}</span>
              <span class="amount">${ing.amount}</span>
            </div>
          `).join('')}
        `}
        <div class="recipe-section-title">Preparación</div>
        <div class="steps">
          ${r.pasos.map((p, pi) => `
            <div class="step">
              <div class="step-num">${pi + 1}</div>
              <div>${p}</div>
            </div>
          `).join('')}
        </div>
        ${r.tip ? `<div class="tip">${r.tip}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function toggleCard(i) {
  const card = document.getElementById('card-' + i);
  card.classList.toggle('open');
}

renderCats();
renderLista();
</script>
</body>
</html>
